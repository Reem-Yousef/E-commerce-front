<div class="product-list-container">
  <div class="list-header">
    <div class="product-header">
      <div class="product-container-header">
        <div class="title">
          <span>Explore Our Shop</span>
        </div>

        <!-- Search Bar -->
        <div class="search-section">
          <div class="search-container">
            <div class="search-input-wrapper">
              <input
                type="text"
                [(ngModel)]="searchQuery"
                (input)="onSearchInput($event)"
                (keyup.enter)="onSearchSubmit()"
                (focus)="showSuggestions = searchSuggestions.length > 0"
                placeholder="Search for products..."
                class="search-input"
                autocomplete="off">

              <button
                *ngIf="searchQuery"
                (click)="clearSearch()"
                class="clear-search-btn"
                type="button">
                ×
              </button>

              <button
                (click)="onSearchSubmit()"
                class="search-btn"
                type="button">
                search
              </button>
            </div>

            <!-- Search Suggestions -->
            <div *ngIf="showSuggestions && searchSuggestions.length > 0" class="suggestions-dropdown">
              <div *ngFor="let suggestion of searchSuggestions" (click)="selectSuggestion(suggestion)" class="suggestion-item">
                {{ suggestion }}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Filters Bar -->
    <div class="filters-bar">
      <div class="filters-container">
        <div class="filter-group">
          <div class="filter-item">
            <label>Brand</label>
            <select [(ngModel)]="selectedBrand" (change)="onBrandChange($event)" class="dropdown">
              <option value="">All Brands</option>
              <option *ngFor="let brand of brands" [value]="brand">{{ brand }}</option>
            </select>
          </div>

          <div class="filter-item">
            <label>Price Range</label>
            <div class="price-inputs">
              <input type="number" [(ngModel)]="minPrice" (change)="onPriceRangeChange()" [placeholder]="'Min'" class="price-input">
              <span class="sep">-</span>
              <input type="number" [(ngModel)]="maxPrice" (change)="onPriceRangeChange()" [placeholder]="'Max'" class="price-input">
            </div>
          </div>

          <div class="filter-item">
            <label>Rating</label>
            <select [(ngModel)]="minRating" (change)="onRatingChange()" class="dropdown">
              <option [ngValue]="null">Any Rating</option>
              <option [ngValue]="4">4+ Stars</option>
              <option [ngValue]="3">3+ Stars</option>
              <option [ngValue]="2">2+ Stars</option>
            </select>
          </div>

          <div class="filter-item">
            <label>Sort By</label>
            <select [(ngModel)]="selectedSort" (change)="onSortChange(selectedSort)" class="dropdown">
              <option *ngFor="let option of sortOptions" [value]="option.value">{{ option.label }}</option>
            </select>
          </div>
        </div>

        <div class="filter-actions">
          <div class="stock-toggle">
            <label class="switch">
              <input type="checkbox" [(ngModel)]="inStockOnly" (change)="onInStockChange()">
              <span class="slider round"></span>
            </label>
            <span class="toggle-label">In Stock</span>
          </div>

          <button (click)="clearFilters()" class="clear-all-btn" *ngIf="selectedBrand || minPrice || maxPrice || inStockOnly || minRating">
            Clear All
          </button>
        </div>
      </div>

      <div class="results-summary">
        <p *ngIf="!loading">
          Showing <strong>{{ resultsCount }}</strong> of {{ totalResults }} items
          <span *ngIf="searchQuery">for "<i>{{ searchQuery }}</i>"</span>
        </p>
      </div>
    </div>
  </div>

  <!-- Loading State -->
  <div *ngIf="loading" class="loading-state">
    <div class="loading-spinner"></div>
    <p>Loading products...</p>
  </div>

  <!-- Error State -->
  <div *ngIf="error && !loading" class="error-state">
    <p>{{ error }}</p>
    <button (click)="loadProducts()" class="retry-btn">Try Again</button>
  </div>

  <!-- Products Grid -->
  <div *ngIf="!loading && !error" class="products-grid">
    <app-product-card
      *ngFor="let product of filteredProducts; trackBy: trackByProductId"
      [product]="product">
    </app-product-card>
  </div>

  <!-- Empty State -->
  <div *ngIf="!loading && !error && filteredProducts.length === 0" class="empty-state">
    <p>No products found.</p>
    <button *ngIf="searchQuery || selectedBrand || minPrice || maxPrice || inStockOnly || minRating"
            (click)="clearFilters()"
            class="clear-filters-btn">
      Clear all filters
    </button>
  </div>

  <!-- Pagination -->
  <div *ngIf="!loading && !error && totalPages > 1" class="pagination">
    <button
      (click)="previousPage()"
      [disabled]="currentPage === 1"
      class="pagination-btn">
      Previous
    </button>

    <div class="page-numbers">
      <button
        *ngFor="let page of getPageNumbers()"
        (click)="goToPage(page)"
        [class.active]="page === currentPage"
        class="page-btn">
        {{ page }}
      </button>
    </div>

    <button
      (click)="nextPage()"
      [disabled]="currentPage === totalPages"
      class="pagination-btn">
      Next
    </button>
  </div>
</div>
