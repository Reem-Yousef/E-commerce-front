<div class="_mainContainer">
  <div class="_Container">
    <div class="_image">
      <div
        class="_Title"
        data-aos="fade-right"
        data-aos-duration="1000"
        data-aos-easing="ease-in-out"
      >
        <h3>Welcome back</h3>
        <p>
          Step back into a world where nature meets design. Access your account
          and continue exploring elegant, nature-inspired pieces that bring life
          and luxury to every space.
        </p>
      </div>
    </div>
    <div class="_FormContainer">
      <div class="_Title">Sign In</div>
      <form class="_Form" (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div class="_field _emailField">
          <div class="_inputField">
            <input
              type="email"
              name="email"
              [(ngModel)]="email"
              placeholder="Enter your email"
              class="_Email"
              required
              #emailInput="ngModel"
            />
          </div>
        </div>

        <div class="_field create-password">
          <div class="_inputField">
            <input
              [type]="isPasswordVisible ? 'text' : 'password'"
              name="password"
              [(ngModel)]="password"
              placeholder="Enter password"
              class="_Password"
              required
              #passwordInput="ngModel"
            />
            <span class="show-hide-toggle" (click)="togglePasswordVisibility()">
              <svg *ngIf="!isPasswordVisible" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              <svg *ngIf="isPasswordVisible" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
            </span>
          </div>
        </div>

        <div class="_inputField _button">
          <input
            type="submit"
            value="SignIn Now"
            class="_btn"
            [disabled]="!email || !password "
          />
        </div>
        
        <div class="form-error-container" *ngIf="errorMsg">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#d93025" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
          <p class="error-text">{{ errorMsg }}</p>
        </div>
        <div class="_Link">
          <a [routerLink]="['/signup']">Create An Account?</a>
        </div>

        <div class="_footerCopyRight">
          <div class="_text">Copyright &copy; 2025 Generic eCommerce</div>
        </div>
      </form>
    </div>
  </div>
</div>
